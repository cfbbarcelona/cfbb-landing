<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Futbol Botons Barcelona</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background-color: #071409;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Fons amb gradient gespa subtil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(30, 100, 30, 0.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(15, 70, 20, 0.18) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Línia decorativa superior */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1a4d1a, #5aab3f, #1a4d1a);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 100%;
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: 2.5rem;
      animation: fadeInDown 0.9s ease both;
    }

    .logo-wrapper img {
      width: 200px;
      height: auto;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }

    /* Títol */
    .headline {
      animation: fadeInUp 0.9s ease 0.2s both;
    }

    .headline h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: normal;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: #ffffff;
      text-transform: uppercase;
    }

    .headline h1 span {
      display: block;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      letter-spacing: 0.3em;
      color: #7ec86a;
      text-transform: uppercase;
      margin-top: 0.5rem;
      font-family: 'Arial', sans-serif;
      font-weight: 400;
    }

    /* Separador */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #5aab3f, transparent);
      margin: 2rem auto;
      animation: fadeIn 0.9s ease 0.4s both;
    }

    /* Text principal */
    .message {
      animation: fadeInUp 0.9s ease 0.5s both;
    }

    .message p {
      font-family: 'Arial', sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      line-height: 1.8;
      color: #b8c8dc;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Badge "Properament" */
    .badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(90, 171, 63, 0.5);
      border-radius: 2px;
      font-family: 'Arial', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #7ec86a;
      background: rgba(90, 171, 63, 0.08);
      animation: fadeIn 0.9s ease 0.7s both;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Arial', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      animation: fadeIn 1s ease 1s both;
    }

    /* Animacions */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo-wrapper img {
        width: 150px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <div class="container">

    <div class="logo-wrapper">
      <img src="assets/img/logo-cfbb.svg" alt="Club Futbol Botons Barcelona">
    </div>

    <div class="headline">
      <h1>
        Club Futbol Botons Barcelona
        <span>Estem preparant alguna cosa gran</span>
      </h1>
    </div>

    <div class="divider"></div>

    <div class="message">
      <p>
        El nou web del CFBB est&agrave; en construcci&oacute;. Aviat podreu trobar aqu&iacute; tota la informaci&oacute; sobre el club, tornejos, activitats i molt m&eacute;s.
      </p>
    </div>

    <div class="badge">Properament</div>

  </div>

  <div class="footer">
    &copy; 2025 Club Futbol Botons Barcelona
  </div>

</body>
</html>
